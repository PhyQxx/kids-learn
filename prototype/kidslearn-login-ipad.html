<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>趣学星球 - 登录（iPad横屏）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B6B;--primary-light:#FF8E8E;--bg:#FFF5F5;--white:#FFF;--text:#333;--text-light:#999;--radius:24px;--shadow:0 8px 32px rgba(0,0,0,.1)}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}

.login-container{display:flex;width:900px;height:600px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

/* 左侧品牌区 */
.brand-side{
  width:360px;background:linear-gradient(135deg,var(--primary),var(--primary-light));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;
}
.brand-logo{font-size:96px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.brand-title{font-size:36px;font-weight:800;color:#FFF;margin-bottom:8px}
.brand-sub{font-size:16px;color:rgba(255,255,255,.8);margin-bottom:40px;text-align:center}
.brand-features{display:flex;flex-direction:column;gap:16px;width:100%}
.brand-feature{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.2);padding:14px 18px;border-radius:14px}
.brand-feature-icon{font-size:28px;flex-shrink:0}
.brand-feature-text{font-size:15px;font-weight:600;color:#FFF}
.brand-footer{position:absolute;bottom:32px;font-size:13px;color:rgba(255,255,255,.6)}

/* 右侧登录区 */
.login-side{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px}

/* 年龄组选择 */
.age-select{display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.age-select.active{display:flex}
.logo-emoji{font-size:64px;margin-bottom:12px;animation:pulse 2s ease-in-out infinite}
.logo-title{font-size:32px;font-weight:800;color:var(--primary);margin-bottom:6px}
.logo-sub{font-size:14px;color:var(--text-light);margin-bottom:32px}
.age-cards{display:flex;flex-direction:column;gap:14px;width:100%}
.age-card{background:#FFF;border-radius:18px;padding:22px 20px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(0,0,0,.06);cursor:pointer;transition:all .2s;border:3px solid transparent;min-height:80px}
.age-card:hover{border-color:var(--primary-light);transform:translateY(-2px)}
.age-card.selected{border-color:var(--primary);background:#FFF5F5}
.age-icon{font-size:44px;flex-shrink:0}
.age-info{flex:1}
.age-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.age-desc{font-size:13px;color:var(--text-light)}
.age-arrow{font-size:22px;color:#CCC}
.start-btn{width:100%;max-width:360px;margin-top:28px;height:52px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:none;border-radius:26px;color:#FFF;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,107,107,.4);letter-spacing:1px;transition:all .15s}
.start-btn:active{transform:scale(.97)}

/* 登录表单 */
.login-form{display:none;flex-direction:column;align-items:center;width:100%;max-width:400px}
.login-form.active{display:flex}
.login-header{text-align:center;margin-bottom:28px}
.login-title{font-size:28px;font-weight:800;color:var(--text);margin-bottom:6px}
.login-sub{font-size:14px;color:var(--text-light)}
.form-fields{display:flex;flex-direction:column;gap:14px;width:100%}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:13px;font-weight:600;color:#666;padding-left:4px}
.input-row{display:flex;gap:10px}
.input-field{flex:1;height:52px;border:2px solid #F0F0F0;border-radius:14px;padding:0 16px;font-size:16px;outline:none;transition:border-color .2s;background:#FFF}
.input-field:focus{border-color:var(--primary)}
.input-code{width:120px;height:52px;border:2px solid #F0F0F0;border-radius:14px;background:#F8F8F8;font-size:13px;color:var(--primary);font-weight:700;cursor:pointer;transition:all .2s}
.get-code{font-size:13px;color:var(--primary);font-weight:600;border:none;background:none;cursor:pointer;white-space:nowrap;height:52px;display:flex;align-items:center}
.login-btn{height:52px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:none;border-radius:26px;color:#FFF;font-size:17px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(255,107,107,.35);width:100%}
.login-divider{display:flex;align-items:center;gap:16px;margin:12px 0;width:100%}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#EEE}
.login-divider span{font-size:13px;color:#CCC}
.third-login{display:flex;gap:20px;justify-content:center}
.third-btn{width:56px;height:56px;border-radius:16px;background:#F5F5F5;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.third-btn:hover{background:#EEE;transform:scale(1.05)}
.privacy-note{font-size:12px;color:#BBB;text-align:center;margin-top:16px;line-height:1.6}

.switch-form{font-size:14px;color:var(--text-light);margin-top:20px}
.switch-form a{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:none}
</style>
</head>
<body>

<div class="login-container">

  <!-- 左侧品牌 -->
  <div class="brand-side" style="position:relative">
    <div class="brand-logo">🌟</div>
    <div class="brand-title">趣学星球</div>
    <div class="brand-sub">让孩子爱上学习</div>
    <div class="brand-features">
      <div class="brand-feature"><span class="brand-feature-icon">📚</span><span class="brand-feature-text">分龄定制学习内容</span></div>
      <div class="brand-feature"><span class="brand-feature-icon">🐱</span><span class="brand-feature-text">宠物陪伴养成好习惯</span></div>
      <div class="brand-feature"><span class="brand-feature-icon">👨‍👩‍👧</span><span class="brand-feature-text">家长全程管控守护</span></div>
      <div class="brand-feature"><span class="brand-feature-icon">🏆</span><span class="brand-feature-text">趣味成就激励学习</span></div>
    </div>
    <div class="brand-footer">© 2024 趣学星球 KidsLearn</div>
  </div>

  <!-- 右侧登录 -->
  <div class="login-side">

    <!-- 年龄选择 -->
    <div class="age-select active" id="ageSelect">
      <div class="logo-emoji">🌟</div>
      <div class="logo-title">趣学星球</div>
      <div class="logo-sub">欢迎来到趣学星球，请先选择孩子的年龄段</div>
      <div class="age-cards">
        <div class="age-card selected" onclick="selectAge(this)">
          <div class="age-icon">🐣</div>
          <div class="age-info">
            <div class="age-name">🍼 幼幼组</div>
            <div class="age-desc">3-5岁 · 学前启蒙</div>
          </div>
          <div class="age-arrow">›</div>
        </div>
        <div class="age-card" onclick="selectAge(this)">
          <div class="age-icon">🌱</div>
          <div class="age-info">
            <div class="age-name">🌿 低龄组</div>
            <div class="age-desc">6-8岁 · 小学低年级</div>
          </div>
          <div class="age-arrow">›</div>
        </div>
        <div class="age-card" onclick="selectAge(this)">
          <div class="age-icon">🌳</div>
          <div class="age-info">
            <div class="age-name">🌳 高龄组</div>
            <div class="age-desc">9-12岁 · 小学高年级</div>
          </div>
          <div class="age-arrow">›</div>
        </div>
      </div>
      <button class="start-btn" onclick="showLogin()">开始学习 ›</button>
    </div>

    <!-- 登录表单 -->
    <div class="login-form" id="loginForm">
      <div class="login-header">
        <div class="login-title">欢迎回来！</div>
        <div class="login-sub">登录后开始学习之旅</div>
      </div>
      <div class="form-fields">
        <div class="input-group">
          <div class="input-label">手机号</div>
          <div class="input-row">
            <input class="input-field" placeholder="请输入手机号" value="13812345678">
            <button class="get-code" onclick="this.textContent='重新获取'">获取验证码</button>
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">验证码</div>
          <div class="input-row">
            <input class="input-field" placeholder="请输入验证码" value="1234">
          </div>
        </div>
      </div>
      <button class="login-btn" onclick="location.href='kidslearn-home-ipad.html'">登录 / 注册</button>
      <div class="login-divider"><span>或</span></div>
      <div class="third-login">
        <button class="third-btn">🍎</button>
        <button class="third-btn">🐧</button>
        <button class="third-btn">💬</button>
      </div>
      <div class="privacy-note">登录即表示同意<a href="#" style="color:var(--primary)">《用户协议》</a>和<a href="#" style="color:var(--primary)">《隐私政策》</a></div>
      <div class="switch-form"><a onclick="document.getElementById('ageSelect').classList.add('active');document.getElementById('loginForm').classList.remove('active')">‹ 返回选择年龄</a></div>
    </div>

  </div>
</div>

<script>
function selectAge(el){
  document.querySelectorAll('.age-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
}
function showLogin(){
  document.getElementById('ageSelect').classList.remove('active');
  document.getElementById('loginForm').classList.add('active');
}
</script>
</body>
</html>
