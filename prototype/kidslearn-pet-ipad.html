<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>趣学星球 - 宠物养成（iPad横屏）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B6B;--primary-light:#FF8E8E;--accent:#FFE66D;--teal:#4ECDC4;--bg:#F7F7F7;--white:#FFF;--text:#333;--text-light:#999;--radius:16px;--shadow:0 4px 20px rgba(0,0,0,.08)}
html,body{height:100%;overflow:hidden}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);display:flex}

.sidebar{width:220px;height:100vh;background:var(--white);display:flex;flex-direction:column;align-items:center;border-right:1px solid #F0F0F0;flex-shrink:0;position:relative;z-index:10}
.sidebar-logo{padding:28px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.sidebar-emoji{font-size:48px}
.sidebar-title{font-size:18px;font-weight:800;color:var(--primary)}
.sidebar-sub{font-size:11px;color:var(--text-light)}
.nav-items{flex:1;display:flex;flex-direction:column;gap:4px;padding:8px 12px;width:100%}
.nav-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;cursor:pointer;border:none;background:none;width:100%;font-size:15px;font-weight:600;color:#666;transition:all .15s;text-align:left}
.nav-item:hover{background:#FFF5F5;color:var(--primary)}
.nav-item.active{background:#FFF0F0;color:var(--primary)}
.nav-item .nav-icon{font-size:22px;flex-shrink:0}
.sidebar-user{width:100%;padding:16px;border-top:1px solid #F5F5F5;display:flex;align-items:center;gap:12px}
.user-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-level{font-size:11px;color:var(--text-light)}
.user-gems{font-size:20px}

.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top-bar{height:64px;background:var(--white);display:flex;align-items:center;padding:0 32px;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-shrink:0}
.top-title{font-size:20px;font-weight:800;color:var(--text)}
.top-coin{display:flex;align-items:center;gap:8px;background:#FFF5F5;padding:8px 16px;border-radius:20px}
.coin-num{font-size:18px;font-weight:700;color:var(--primary)}

.content-scroll{flex:1;overflow-y:auto;padding:20px 32px 24px}

/* 左右双栏布局 */
.pet-layout{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}

/* 左：宠物展示 */
.pet-panel{background:linear-gradient(135deg,#FFB6C1,#FFD4E5);border-radius:var(--radius);padding:28px 24px;text-align:center;position:relative;overflow:hidden}
.pet-panel::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.2);border-radius:50%}
.pet-avatar{font-size:120px;margin-bottom:12px;animation:float 3s ease-in-out infinite;display:block;filter:drop-shadow(0 8px 20px rgba(0,0,0,.1))}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(3deg)}}
.pet-name-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.pet-name{font-size:26px;font-weight:800;color:#FFF}
.pet-level-badge{background:rgba(255,255,255,.3);color:#FFF;font-size:13px;font-weight:700;padding:4px 14px;border-radius:12px}
.pet-evolution{font-size:13px;color:rgba(255,255,255,.85);margin-bottom:14px}
.exp-bar-wrap{width:100%}
.exp-label{font-size:12px;color:rgba(255,255,255,.9);margin-bottom:6px;display:flex;justify-content:space-between}
.exp-bar{height:10px;background:rgba(255,255,255,.3);border-radius:5px;overflow:hidden}
.exp-fill{height:100%;background:var(--accent);border-radius:5px;transition:width .6s ease}

/* 状态条 */
.pet-stats{background:var(--white);border-radius:var(--radius);padding:16px 20px;margin-top:14px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow)}
.stat-row{display:flex;align-items:center;gap:12px}
.stat-icon{font-size:26px;flex-shrink:0}
.stat-info{flex:1}
.stat-name{font-size:13px;color:var(--text-light);margin-bottom:5px}
.stat-bar{height:8px;background:#F0F0F0;border-radius:4px;overflow:hidden}
.stat-fill{height:100%;border-radius:4px;transition:width .5s ease}
.stat-val{font-size:15px;font-weight:700;min-width:44px;text-align:right}

/* 动作按钮 */
.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.action-btn{
  background:rgba(255,255,255,.9);border-radius:14px;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all .15s;border:none;backdrop-filter:blur(4px);
}
.action-btn:active{transform:scale(.95)}
.action-icon{font-size:28px}
.action-name{font-size:13px;font-weight:600;color:var(--text)}

/* 右：背包 */
.right-panel{display:flex;flex-direction:column;gap:16px}

.section-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.section-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}

.item-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.item-card{
  background:#FAFAFA;border-radius:12px;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;transition:all .15s;border:2px solid transparent;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.item-card:active{transform:scale(.95)}
.item-card.selected{border-color:var(--primary);background:#FFF5F5}
.item-emoji{font-size:30px}
.item-name{font-size:12px;color:var(--text);font-weight:600;text-align:center}
.item-count{font-size:11px;color:var(--text-light)}
.item-price{font-size:12px;color:var(--primary);font-weight:700}
.item-locked{font-size:11px;color:var(--text-light)}

/* Tab Bar */


.tab-icon{font-size:28px;transition:transform .15s}
.tab-label{font-size:12px;color:var(--text-light);font-weight:600}
.tab-item.active .tab-label{color:var(--primary);font-weight:700}
.tab-item.active .tab-icon{transform:scale(1.1)}

/* 弹窗 */
.modal{position:fixed;top:0;left:220px;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--white);border-radius:24px;width:90%;max-width:500px;padding:28px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{font-size:22px;font-weight:800;color:var(--text);text-align:center;margin-bottom:20px}
.food-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.food-card{background:#FAFAFA;border-radius:14px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .15s;border:2px solid transparent}
.food-card:hover{background:#F0F0F0}
.food-card.selected{border-color:var(--primary);background:#FFF5F5}
.food-emoji{font-size:40px}
.food-name{font-size:14px;font-weight:700;color:var(--text)}
.food-effect{font-size:12px;color:#2ECC71}
.food-price{font-size:13px;color:var(--primary);font-weight:700}
.modal-btn{width:100%;height:50px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border:none;border-radius:25px;color:#FFF;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;transition:all .15s}
.modal-btn:active{transform:scale(.97)}
.modal-cancel{background:none;border:none;font-size:14px;color:var(--text-light);cursor:pointer;margin-top:10px;display:block;width:100%;text-align:center}

/* 确认弹窗 */
.confirm-modal{position:fixed;top:0;left:220px;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:center;justify-content:center}
.confirm-modal.active{display:flex}
.confirm-box{background:var(--white);border-radius:20px;padding:32px 28px;text-align:center;max-width:340px;width:90%}
.confirm-emoji{font-size:72px;margin-bottom:14px}
.confirm-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px}
.confirm-sub{font-size:14px;color:var(--text-light);margin-bottom:22px}
.confirm-row{display:flex;gap:12px}
.confirm-cancel{flex:1;height:48px;border-radius:24px;border:2px solid #F0F0F0;background:var(--white);color:#666;font-size:15px;font-weight:700;cursor:pointer}
.confirm-ok{flex:1;height:48px;border-radius:24px;border:none;background:var(--primary);color:#FFF;font-size:15px;font-weight:700;cursor:pointer}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-sub,.sidebar.collapsed .user-info,.sidebar.collapsed .nav-item span:not(.nav-icon),.sidebar.collapsed .sidebar-user .user-gems{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:14px 0}
.sidebar.collapsed .sidebar-logo{padding:20px 0}
.sidebar.collapsed .sidebar-user{justify-content:center;padding:12px 0}
.sidebar-toggle{cursor:pointer;font-size:20px;padding:8px 0;text-align:center;display:block;margin-bottom:4px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">☰</div>
    <div class="sidebar-emoji">🌟</div>
    <div class="sidebar-title">趣学星球</div>
    <div class="sidebar-sub">KidsLearn</div>
  </div>
  <nav class="nav-items">
    <button class="nav-item" onclick="location.href='kidslearn-home-ipad.html'"><span class="nav-icon">🏠</span>首页</button>
    <button class="nav-item" onclick="location.href='kidslearn-grade-ipad.html'"><span class="nav-icon">📖</span>学习中心</button>
    <button class="nav-item active"><span class="nav-icon">🐱</span>宠物养成</button>
    <button class="nav-item" onclick="location.href='kidslearn-ranking-ipad.html'"><span class="nav-icon">🏆</span>排行榜</button>
    <button class="nav-item" onclick="location.href='kidslearn-achievement-ipad.html'"><span class="nav-icon">🎖️</span>成就中心</button>
    <button class="nav-item" onclick="location.href='kidslearn-parent-ipad.html'"><span class="nav-icon">👨‍👩‍👧</span>家长中心</button>
    <button class="nav-item" onclick="location.href='kidslearn-vip-ipad.html'"><span class="nav-icon">👑</span>VIP会员</button>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar">🐱</div>
    <div class="user-info"><div class="user-name">小明</div><div class="user-level">Lv.5 好奇宝宝</div></div>
    <div class="user-gems">💎</div>
  </div>
</aside>

<main class="main">
  <header class="top-bar">
    <div class="top-title">🐱 我的宠物</div>
    <div class="top-coin"><span>🪙</span><span class="coin-num">280</span></div>
  </header>

  <div class="content-scroll">
    <div class="pet-layout">
      <!-- 左：宠物展示 -->
      <div>
        <div class="pet-panel">
          <div class="pet-avatar" id="petAvatar">😺</div>
          <div class="pet-name-row">
            <div class="pet-name">小星</div>
            <div class="pet-level-badge">Lv.3</div>
          </div>
          <div class="pet-evolution">🦋 进化：还需 200 经验（少年期）</div>
          <div class="exp-bar-wrap">
            <div class="exp-label"><span>Lv.3</span><span>300/500</span></div>
            <div class="exp-bar"><div class="exp-fill" style="width:60%"></div></div>
          </div>
        </div>

        <div class="pet-stats">
          <div class="stat-row">
            <div class="stat-icon">🍖</div>
            <div class="stat-info">
              <div class="stat-name">饱食度</div>
              <div class="stat-bar"><div class="stat-fill" style="width:70%;background:#4ECDC4"></div></div>
            </div>
            <div class="stat-val" style="color:#4ECDC4">70%</div>
          </div>
          <div class="stat-row">
            <div class="stat-icon">😊</div>
            <div class="stat-info">
              <div class="stat-name">心情</div>
              <div class="stat-bar"><div class="stat-fill" style="width:85%;background:#FFE66D"></div></div>
            </div>
            <div class="stat-val" style="color:#F39C12">开心</div>
          </div>
          <div class="stat-row">
            <div class="stat-icon">⚡</div>
            <div class="stat-info">
              <div class="stat-name">活力值</div>
              <div class="stat-bar"><div class="stat-fill" style="width:90%;background:#9B59B6"></div></div>
            </div>
            <div class="stat-val" style="color:#9B59B6">90%</div>
          </div>
        </div>

        <div class="action-grid">
          <button class="action-btn" onclick="showModal('feed')">
            <div class="action-icon">🍖</div><div class="action-name">喂食</div>
          </button>
          <button class="action-btn" onclick="showModal('bath')">
            <div class="action-icon">🛁</div><div class="action-name">洗澡</div>
          </button>
          <button class="action-btn" onclick="showModal('play')">
            <div class="action-icon">🎾</div><div class="action-name">玩耍</div>
          </button>
          <button class="action-btn" onclick="showModal('dress')">
            <div class="action-icon">👑</div><div class="action-name">换装</div>
          </button>
        </div>
      </div>

      <!-- 右：背包 -->
      <div class="right-panel">
        <div class="section-card">
          <div class="section-title">🎒 背包 · 食物</div>
          <div class="item-grid">
            <div class="item-card" onclick="selectItem(this,'apple')">
              <div class="item-emoji">🍎</div>
              <div class="item-name">苹果</div>
              <div class="item-count">x3</div>
              <div class="item-price">🪙5</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'cake')">
              <div class="item-emoji">🍰</div>
              <div class="item-name">蛋糕</div>
              <div class="item-count">x1</div>
              <div class="item-price">🪙15</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'fish')">
              <div class="item-emoji">🐟</div>
              <div class="item-name">小鱼干</div>
              <div class="item-count">x5</div>
              <div class="item-price">🪙8</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'star')">
              <div class="item-emoji">⭐</div>
              <div class="item-name">星星糖</div>
              <div class="item-count">x2</div>
              <div class="item-price">🪙20</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'pizza')">
              <div class="item-emoji">🍕</div>
              <div class="item-name">披萨</div>
              <div class="item-count">x0</div>
              <div class="item-price">🪙25</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'diamond')">
              <div class="item-emoji">💎</div>
              <div class="item-name">钻石果</div>
              <div class="item-count">x0</div>
              <div class="item-price">💎3</div>
            </div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-title">👑 装饰 · 服装</div>
          <div class="item-grid">
            <div class="item-card" onclick="selectItem(this,'hat')">
              <div class="item-emoji">🎩</div>
              <div class="item-name">小礼帽</div>
              <div class="item-count">持有</div>
              <div class="item-price">🪙50</div>
            </div>
            <div class="item-card" onclick="selectItem(this,'bow')">
              <div class="item-emoji">🎀</div>
              <div class="item-name">蝴蝶结</div>
              <div class="item-count">持有</div>
              <div class="item-price">🪙30</div>
            </div>
            <div class="item-card">
              <div class="item-emoji">👓</div>
              <div class="item-name">眼镜</div>
              <div class="item-locked">🔒未解锁</div>
              <div class="item-price">🪙80</div>
            </div>
            <div class="item-card">
              <div class="item-emoji">🛡️</div>
              <div class="item-name">小盾牌</div>
              <div class="item-locked">🔒未解锁</div>
              <div class="item-price">🪙120</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>



<script>
let selectedFood = null;
let selectedItem = null;

function showModal(type) {
  if (type === 'feed') document.getElementById('feedModal').classList.add('active');
}
function closeModal() {
  document.getElementById('feedModal').classList.remove('active');
  selectedFood = null;
}
function selectFood(el, type) {
  document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedFood = type;
}
function feedPet() {
  if (!selectedFood) { alert('请选择食物'); return; }
  closeModal();
  const foods = { apple:'🍎 苹果', cake:'🍰 蛋糕', fish:'🐟 小鱼干', star:'⭐ 星星糖', pizza:'🍕 披萨', diamond:'💎 钻石果' };
  const effects = { apple:'饱食度+15', cake:'饱食度+30', fish:'饱食度+25', star:'饱食度+20，心情+10', pizza:'饱食度+40', diamond:'饱食度+50，心情+20' };
  document.getElementById('confirmEmoji').textContent = '😋';
  document.getElementById('confirmTitle').textContent = '喂食成功！';
  document.getElementById('confirmSub').textContent = '小星吃了'+foods[selectedFood]+'，'+effects[selectedFood];
  document.getElementById('confirmModal').classList.add('active');
}
function selectItem(el, type) {
  document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedItem = type;
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('active'); }
var sidebarCollapsed=false;function toggleSidebar(){var s=document.querySelector('.sidebar');sidebarCollapsed=!sidebarCollapsed;s.classList.toggle('collapsed',sidebarCollapsed)}</script>
</body>
</html>
