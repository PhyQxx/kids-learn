<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>趣学星球 - 答题闯关（iPad横屏）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B6B;--primary-light:#FF8E8E;--accent:#FFE66D;--teal:#4ECDC4;--blue:#4A90D9;--bg:#F0F7FF;--white:#FFF;--text:#333;--text-light:#999;--radius:16px;--shadow:0 4px 20px rgba(0,0,0,.08)}
html,body{height:100%;overflow:hidden}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:var(--bg);display:flex}

.sidebar{width:220px;height:100vh;background:var(--white);display:flex;flex-direction:column;align-items:center;border-right:1px solid #F0F0F0;flex-shrink:0;position:relative;z-index:10}
.sidebar-logo{padding:28px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
.sidebar-emoji{font-size:48px}
.sidebar-title{font-size:18px;font-weight:800;color:var(--primary)}
.sidebar-sub{font-size:11px;color:var(--text-light)}
.nav-items{flex:1;display:flex;flex-direction:column;gap:4px;padding:8px 12px;width:100%}
.nav-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;cursor:pointer;border:none;background:none;width:100%;font-size:15px;font-weight:600;color:#666;transition:all .15s;text-align:left}
.nav-item:hover{background:#FFF5F5;color:var(--primary)}
.nav-item .nav-icon{font-size:22px;flex-shrink:0}
.sidebar-user{width:100%;padding:16px;border-top:1px solid #F5F5F5;display:flex;align-items:center;gap:12px}
.user-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-level{font-size:11px;color:var(--text-light)}
.user-gems{font-size:20px}

.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ========== 开始页 ========== */
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px;background:linear-gradient(180deg,#F0F7FF 0%,#FFF 100%)}
.start-emoji{font-size:96px;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.start-title{font-size:36px;font-weight:800;color:var(--text);margin-bottom:8px;text-align:center}
.start-sub{font-size:16px;color:var(--text-light);margin-bottom:32px}
.start-info{display:flex;gap:40px;margin-bottom:48px}
.info-item{text-align:center}
.info-val{font-size:32px;font-weight:800;color:var(--blue)}
.info-label{font-size:13px;color:var(--text-light);margin-top:4px}
.start-btn{
  height:60px;padding:0 56px;background:linear-gradient(135deg,#4A90D9,#6BA3E0);
  border:none;border-radius:30px;color:#FFF;font-size:22px;font-weight:700;
  cursor:pointer;box-shadow:0 8px 24px rgba(74,144,217,.4);letter-spacing:2px;
  transition:all .15s;
}
.start-btn:active{transform:scale(.97)}

/* ========== 答题页 ========== */
.quiz-screen{display:none;flex-direction:column;flex:1}
.quiz-top{
  background:var(--white);padding:14px 32px;display:flex;align-items:center;
  justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.05);flex-shrink:0;
}
.quiz-close{width:44px;height:44px;border-radius:12px;background:#F5F5F5;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.quiz-close:hover{background:#EEE}
.quiz-progress{flex:1;margin:0 24px;display:flex;flex-direction:column;gap:6px}
.progress-label{font-size:14px;color:var(--text-light);text-align:center;font-weight:600}
.progress-bar{height:10px;background:#E8F0FE;border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4A90D9,#4ECDC4);border-radius:5px;transition:width .4s ease}
.quiz-timer{font-size:24px;font-weight:800;color:var(--primary);min-width:70px;text-align:right}

.quiz-body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px}
.quiz-content{width:100%;max-width:700px;display:flex;flex-direction:column;align-items:center}

.question-area{text-align:center;margin-bottom:32px}
.question-num{font-size:14px;color:var(--text-light);margin-bottom:12px;font-weight:600}
.question-text{font-size:28px;font-weight:800;color:#1A1A2E;text-align:center;margin-bottom:20px;line-height:1.4}
.question-image{font-size:80px;margin-bottom:16px;text-align:center}

.options{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.option-btn{
  padding:22px 20px;border-radius:18px;
  background:var(--white);border:3px solid #E8F0FE;
  font-size:20px;font-weight:700;color:var(--text);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:12px;text-align:left;
  box-shadow:var(--shadow);
}
.option-btn:hover{border-color:#4A90D9;transform:translateY(-2px)}
.option-btn:active{transform:scale(.97)}
.option-btn .opt-label{font-size:24px;flex-shrink:0;color:var(--blue)}
.option-btn.correct{background:#E8F8EE;border-color:#2ECC71;color:#2ECC71}
.option-btn.wrong{background:#FFE8E8;border-color:#E74C3C;color:#E74C3C;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ========== 结果页 ========== */
.result-screen{display:none;flex-direction:column;align-items:center;flex:1;padding:40px 32px;background:linear-gradient(180deg,#FFF 0%,#F0F7FF 100%)}
.result-emoji{font-size:96px;margin-bottom:16px}
.result-stars{font-size:48px;margin-bottom:12px;animation:popIn .5s ease}
@keyframes popIn{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.result-title{font-size:32px;font-weight:800;color:var(--text);margin-bottom:6px;text-align:center}
.result-sub{font-size:15px;color:var(--text-light);margin-bottom:24px}
.result-rewards{display:flex;gap:20px;margin-bottom:28px}
.reward-item{background:var(--white);border-radius:16px;padding:16px 24px;text-align:center;box-shadow:var(--shadow);min-width:100px}
.reward-emoji{font-size:36px;margin-bottom:6px}
.reward-num{font-size:22px;font-weight:800;color:var(--text)}
.reward-label{font-size:13px;color:var(--text-light)}
.result-card{background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:560px;box-shadow:var(--shadow);margin-bottom:24px}
.result-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #F5F5F5}
.result-row:last-child{border:none}
.result-label{font-size:16px;color:var(--text-light);display:flex;align-items:center;gap:10px}
.result-val{font-size:18px;font-weight:700;color:var(--text)}
.result-actions{display:flex;gap:14px;width:100%;max-width:560px}
.result-btn{height:52px;border-radius:26px;border:none;font-size:17px;font-weight:700;cursor:pointer;flex:1;text-align:center;transition:all .15s}
.result-btn.primary{background:linear-gradient(135deg,#4A90D9,#6BA3E0);color:#FFF;box-shadow:0 4px 16px rgba(74,144,217,.35)}
.result-btn.secondary{background:var(--white);color:var(--blue);border:2px solid var(--blue)}
.result-btn:active{transform:scale(.97)}

/* ========== 动效遮罩 ========== */
.correct-overlay{position:fixed;top:0;left:220px;right:0;bottom:0;pointer-events:none;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(46,204,113,.1)}
.correct-text{font-size:72px;font-weight:900;color:#2ECC71;animation:popIn .5s ease}
.wrong-overlay{position:fixed;top:0;left:220px;right:0;bottom:0;pointer-events:none;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(231,76,60,.1)}
.wrong-text{font-size:72px;font-weight:900;color:#E74C3C;animation:shake .3s ease}
.sidebar.collapsed{width:60px}
.sidebar.collapsed .sidebar-title,.sidebar.collapsed .sidebar-sub,.sidebar.collapsed .user-info,.sidebar.collapsed .nav-item span:not(.nav-icon),.sidebar.collapsed .sidebar-user .user-gems{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:14px 0}
.sidebar.collapsed .sidebar-logo{padding:20px 0}
.sidebar.collapsed .sidebar-user{justify-content:center;padding:12px 0}
.sidebar-toggle{cursor:pointer;font-size:20px;padding:8px 0;text-align:center;display:block;margin-bottom:4px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开侧边栏">☰</div>
    <div class="sidebar-emoji">🌟</div>
    <div class="sidebar-title">趣学星球</div>
    <div class="sidebar-sub">KidsLearn</div>
  </div>
  <nav class="nav-items">
    <button class="nav-item" onclick="location.href='kidslearn-home-ipad.html'"><span class="nav-icon">🏠</span>首页</button>
    <button class="nav-item" onclick="location.href='kidslearn-grade-ipad.html'"><span class="nav-icon">📖</span>学习中心</button>
    <button class="nav-item" onclick="location.href='kidslearn-pet-ipad.html'"><span class="nav-icon">🐱</span>宠物养成</button>
    <button class="nav-item" onclick="location.href='kidslearn-ranking-ipad.html'"><span class="nav-icon">🏆</span>排行榜</button>
    <button class="nav-item" onclick="location.href='kidslearn-achievement-ipad.html'"><span class="nav-icon">🎖️</span>成就中心</button>
    <button class="nav-item" onclick="location.href='kidslearn-parent-ipad.html'"><span class="nav-icon">👨‍👩‍👧</span>家长中心</button>
    <button class="nav-item" onclick="location.href='kidslearn-vip-ipad.html'"><span class="nav-icon">👑</span>VIP会员</button>
  </nav>
  <div class="sidebar-user">
    <div class="user-avatar">🐱</div>
    <div class="user-info"><div class="user-name">小明</div><div class="user-level">Lv.5 好奇宝宝</div></div>
    <div class="user-gems">💎</div>
  </div>
</aside>

<main class="main">
  <!-- 开始页 -->
  <div class="start-screen" id="startScreen">
    <div class="start-emoji">🔢</div>
    <div class="start-title">认识数字</div>
    <div class="start-sub">第 8 关 · 小学一年级</div>
    <div class="start-info">
      <div class="info-item"><div class="info-val">5</div><div class="info-label">题</div></div>
      <div class="info-item"><div class="info-val">⭐⭐</div><div class="info-label">目标星级</div></div>
      <div class="info-item"><div class="info-val">60s</div><div class="info-label">建议用时</div></div>
    </div>
    <button class="start-btn" onclick="startQuiz()">开始闯关 🚀</button>
  </div>

  <!-- 答题页 -->
  <div class="quiz-screen" id="quizScreen">
    <div class="quiz-top">
      <button class="quiz-close" onclick="if(confirm('确定退出？退出将不保存进度'))location.href='kidslearn-levels-ipad.html'">✕</button>
      <div class="quiz-progress">
        <div class="progress-label">第 <span id="qNum">1</span> / 5 题</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:20%"></div></div>
      </div>
      <div class="quiz-timer" id="timer">01:00</div>
    </div>
    <div class="quiz-body">
      <div class="quiz-content">
        <div class="question-area">
          <div class="question-num">单选题</div>
          <div class="question-image" id="qImage">🍎🍎🍎</div>
          <div class="question-text" id="qText">这是几个苹果？</div>
        </div>
        <div class="options" id="options">
          <button class="option-btn" onclick="selectAnswer(this, false)"><span class="opt-label">A.</span>1个</button>
          <button class="option-btn" onclick="selectAnswer(this, false)"><span class="opt-label">B.</span>2个</button>
          <button class="option-btn" onclick="selectAnswer(this, false)"><span class="opt-label">C.</span>3个</button>
          <button class="option-btn" onclick="selectAnswer(this, true)"><span class="opt-label">D.</span>4个</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji">🎉</div>
    <div class="result-stars" id="resultStars">⭐⭐⭐</div>
    <div class="result-title">🎊 闯关成功！</div>
    <div class="result-sub" id="resultSub">用时 45 秒 · 正确率 100%</div>

    <div class="result-rewards">
      <div class="reward-item"><div class="reward-emoji">🪙</div><div class="reward-num">+30</div><div class="reward-label">金币</div></div>
      <div class="reward-item"><div class="reward-emoji">⭐</div><div class="reward-num">+15</div><div class="reward-label">经验</div></div>
      <div class="reward-item"><div class="reward-emoji">🎫</div><div class="reward-num">+1</div><div class="reward-label">贴纸</div></div>
    </div>

    <div class="result-card">
      <div class="result-row">
        <div class="result-label">🏆 评价</div>
        <div class="result-val" id="resultGrade" style="color:#4A90D9">优秀</div>
      </div>
      <div class="result-row">
        <div class="result-label">⏱️ 用时</div>
        <div class="result-val" id="resultTime">45 秒</div>
      </div>
      <div class="result-row">
        <div class="result-label">✅ 正确数</div>
        <div class="result-val" id="resultCorrect">5 / 5</div>
      </div>
      <div class="result-row">
        <div class="result-label">⭐ 获得星星</div>
        <div class="result-val" id="resultStarsRow">⭐⭐⭐</div>
      </div>
    </div>

    <div class="result-actions">
      <button class="result-btn primary" onclick="location.href='kidslearn-levels-ipad.html'">返回关卡</button>
      <button class="result-btn secondary" onclick="location.href='kidslearn-quiz-ipad.html?level=9'">继续下一关 ›</button>
    </div>
  </div>
</main>

<!-- 动效遮罩 -->
<div class="correct-overlay" id="correctOverlay"><div class="correct-text">✅ 正确！</div></div>
<div class="wrong-overlay" id="wrongOverlay"><div class="wrong-text">❌ 答错了</div></div>

<script>
const questions = [
  { img:'🍎🍎🍎', text:'这是几个苹果？', options:['1个','2个','3个','4个'], answer:2 },
  { img:'⭐⭐', text:'这是几颗星星？', options:['1颗','2颗','3颗','4颗'], answer:1 },
  { img:'🌟🌟🌟🌟', text:'这是几颗星星？', options:['2颗','3颗','4颗','5颗'], answer:2 },
  { img:'🍌🍌🍌🍌🍌', text:'这是几根香蕉？', options:['3根','4根','5根','6根'], answer:2 },
  { img:'🐟🐟🐟🐟🐟🐟', text:'这是几条鱼？', options:['5条','6条','7条','8条'], answer:1 },
];

let currentQ = 0;
let timer = 60;
let timerInterval;
let correctCount = 0;
let wrongCount = 0;

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'flex';
  loadQuestion();
  startTimer();
}

function startTimer() {
  timerInterval = setInterval(() => {
    timer--;
    let m = Math.floor(timer/60);
    let s = timer%60;
    document.getElementById('timer').textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    if (timer <= 10) document.getElementById('timer').style.color = '#E74C3C';
    if (timer <= 0) { clearInterval(timerInterval); showResult(); }
  }, 1000);
}

function loadQuestion() {
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = currentQ + 1;
  document.getElementById('progressFill').style.width = ((currentQ+1)/questions.length*100)+'%';
  document.getElementById('qImage').textContent = q.img;
  document.getElementById('qText').textContent = q.text;
  const labels = ['A.','B.','C.','D.'];
  document.getElementById('options').innerHTML = q.options.map((opt,i)=>
    `<button class="option-btn" onclick="selectAnswer(this,${i===q.answer})">`+
    `<span class="opt-label">${labels[i]}</span>${opt}</button>`
  ).join('');
}

function selectAnswer(btn, correct) {
  if (btn.classList.contains('disabled')) return;
  document.querySelectorAll('.option-btn').forEach(b => { b.classList.add('disabled'); b.style.cursor='default'; });
  if (correct) {
    btn.classList.add('correct');
    document.getElementById('correctOverlay').style.display='flex';
    correctCount++;
    setTimeout(() => {
      document.getElementById('correctOverlay').style.display='none';
      nextQuestion();
    }, 700);
  } else {
    btn.classList.add('wrong');
    const btns = document.querySelectorAll('.option-btn');
    btns[questions[currentQ].answer].classList.add('correct');
    document.getElementById('wrongOverlay').style.display='flex';
    wrongCount++;
    setTimeout(() => {
      document.getElementById('wrongOverlay').style.display='none';
      nextQuestion();
    }, 1000);
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) { showResult(); return; }
  loadQuestion();
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('quizScreen').style.display = 'none';
  const rate = correctCount / questions.length;
  let stars = rate >= 1 && timer > 30 ? '⭐⭐⭐' : rate >= 0.8 ? '⭐⭐' : '⭐';
  let title = rate >= 0.6 ? '🎊 闯关成功！' : '😢 再接再厉！';
  let grade = rate >= 1 ? '优秀' : rate >= 0.8 ? '良好' : rate >= 0.6 ? '及格' : '需加油';
  let gradeColor = rate >= 0.8 ? '#4A90D9' : rate >= 0.6 ? '#F39C12' : '#E74C3C';
  const used = 60 - timer;

  document.getElementById('resultStars').textContent = stars;
  document.querySelector('.result-title').textContent = title;
  document.getElementById('resultSub').textContent = `用时 ${used} 秒 · 正确率 ${Math.round(rate*100)}%`;
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultGrade').style.color = gradeColor;
  document.getElementById('resultTime').textContent = used + ' 秒';
  document.getElementById('resultCorrect').textContent = correctCount + ' / ' + questions.length;
  document.getElementById('resultStarsRow').textContent = stars;
  document.getElementById('resultScreen').style.display = 'flex';
}
var sidebarCollapsed=false;function toggleSidebar(){var s=document.querySelector('.sidebar');sidebarCollapsed=!sidebarCollapsed;s.classList.toggle('collapsed',sidebarCollapsed)}</script>
</body>
</html>
